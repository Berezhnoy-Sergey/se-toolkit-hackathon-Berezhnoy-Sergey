# Simple docker-compose for services only (no backend build)
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "42002:80"
    volumes:
      - ./web-client:/usr/share/nginx/html:ro
      - ./web-client/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
